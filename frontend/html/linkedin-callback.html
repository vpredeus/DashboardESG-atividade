<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENIAC ESG – Autenticando com LinkedIn...</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" href="../images/esg_logo.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      body {
        background: var(--bg-dark, #0b1023);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: "Sora", sans-serif;
        color: #fff;
      }
      .callback-card {
        text-align: center;
        max-width: 380px;
        padding: 40px 32px;
        background: rgba(20, 28, 80, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        backdrop-filter: blur(20px);
      }
      .callback-icon {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 1.8rem;
        background: rgba(10, 102, 194, 0.15);
        border: 1px solid rgba(10, 102, 194, 0.35);
        color: #0a66c2;
      }
      .callback-icon.success {
        background: rgba(46, 204, 113, 0.12);
        border-color: rgba(46, 204, 113, 0.35);
        color: #2ecc71;
      }
      .callback-icon.error {
        background: rgba(231, 76, 60, 0.12);
        border-color: rgba(231, 76, 60, 0.35);
        color: #e74c3c;
      }
      .callback-title {
        font-size: 1.15rem;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .callback-msg {
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.5;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #0a66c2;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="callback-card" id="card">
      <div class="spinner" id="spinner"></div>
      <div class="callback-title" id="title">Autenticando com LinkedIn...</div>
      <p class="callback-msg" id="msg">
        Aguarde, estamos verificando sua conta.
      </p>
    </div>

    <script type="module">
      import { finalizarLinkedinLogin } from "../js/auth.js";

      (async () => {
        const params = new URLSearchParams(location.search);
        const code = params.get("code");
        const state = params.get("state");
        const error = params.get("error");

        const spinner = document.getElementById("spinner");
        const icon = document.createElement("div");
        const title = document.getElementById("title");
        const msg = document.getElementById("msg");
        const card = document.getElementById("card");

        function showResult(type, titleText, msgText) {
          spinner.remove();
          icon.className = `callback-icon ${type}`;
          icon.innerHTML =
            type === "success"
              ? '<i class="fa-solid fa-circle-check"></i>'
              : '<i class="fa-solid fa-circle-xmark"></i>';
          card.prepend(icon);
          title.textContent = titleText;
          msg.textContent = msgText;
        }

        // LinkedIn retornou erro (ex: usuário cancelou)
        if (error) {
          showResult(
            "error",
            "Autenticação cancelada",
            "O login com LinkedIn foi cancelado ou negado.",
          );
          setTimeout(() => (window.location.href = "./login.html"), 3000);
          return;
        }

        if (!code || !state) {
          showResult(
            "error",
            "Parâmetros inválidos",
            "O callback do LinkedIn não retornou os dados esperados.",
          );
          setTimeout(() => (window.location.href = "./login.html"), 3000);
          return;
        }

        try {
          await finalizarLinkedinLogin(code, state);
          showResult(
            "success",
            "LinkedIn conectado!",
            "Redirecionando para o dashboard...",
          );
          setTimeout(() => (window.location.href = "../index.html"), 1500);
        } catch (err) {
          showResult(
            "error",
            "Falha na autenticação",
            err?.message ||
              "Não foi possível autenticar com o LinkedIn. Tente novamente.",
          );
          setTimeout(() => (window.location.href = "./login.html"), 3000);
        }
      })();
    </script>
  </body>
</html>
